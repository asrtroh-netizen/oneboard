# OneBoard — local image build (CI maintainer / dev only)
# ARM/NAS users: prefer `docker compose pull` from docker-compose.yml instead.
#
#   docker compose -f docker-compose.build.yml build
#   docker compose -f docker-compose.build.yml up -d

services:
  onebord:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ONEBOARD_LOCAL_IMAGE:-onebord:local}
    container_name: onebord
    restart: unless-stopped
    network_mode: host
    environment:
      ONEBORD_RUNTIME: docker
      ONEBORD_HOST: 0.0.0.0
      ONEBORD_PORT: ${ONEBOARD_PORT:-8866}
      ONEBORD_PROC_ROOT: /host/proc
      ONEBORD_DISK_PATH: /host/root
    volumes:
      - onebord-data:/app/.onebord
      - /proc:/host/proc:ro
      - /:/host/root:ro

volumes:
  onebord-data:
