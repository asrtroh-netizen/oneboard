<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover：允许内容延伸进 iOS 刘海/灵动岛区域，由 CSS safe-area 接管留白 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Android/iOS 系统级 UI 着色（状态栏 / Safari 标签栏），运行时由主题切换动态同步 -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050507" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e8edff" />
    <!-- 添加到主屏幕：Android（W3C manifest）+ iOS（apple-* 专属标签） -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="OneBoard" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OneBoard" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- 面板内大量 ICCID/端口等数字，禁用 iOS 自动识别为电话号码 -->
    <meta name="format-detection" content="telephone=no" />
    <!-- 字体自托管：摆脱 Google Fonts CDN（大陆环境首屏挂起），离线可用 -->
    <link rel="preload" href="/fonts/roboto-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>OneBoard 控制面板</title>
    <style id="boot-critical">
      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
      }

      #app {
        min-height: 100vh;
      }

      html[data-theme='dark'] {
        background-color: #050507;
        background-image: linear-gradient(180deg, #0a0a0c 0%, #050507 52%, #030305 100%);
        background-attachment: fixed;
        background-repeat: no-repeat;
      }

      html[data-theme='light'] {
        background-color: #e8edff;
        background-image:
          radial-gradient(ellipse 90% 70% at 12% 18%, rgba(196, 181, 253, 0.58) 0%, transparent 58%),
          radial-gradient(ellipse 75% 60% at 88% 12%, rgba(147, 197, 253, 0.52) 0%, transparent 54%),
          linear-gradient(155deg, #e8edff 0%, #edf8f3 32%, #f0ebff 58%, #fdf0e8 100%);
        background-attachment: fixed;
        background-repeat: no-repeat;
      }

      .boot-shell {
        box-sizing: border-box;
        display: flex;
        gap: 16px;
        min-height: 100vh;
        padding: 28px;
      }

      .boot-shell__aside {
        flex: 0 0 196px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .boot-shell__main {
        flex: 1;
        min-width: 0;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
      }

      html[data-theme='light'] .boot-shell__aside,
      html[data-theme='light'] .boot-shell__main {
        background: rgba(255, 255, 255, 0.42);
      }

      /* 移动端首帧骨架：侧栏变顶部横条，留白收紧并避开刘海安全区 */
      @media (max-width: 900px) {
        .boot-shell {
          flex-direction: column;
          gap: 10px;
          padding: 12px;
          padding-top: max(12px, env(safe-area-inset-top));
        }

        .boot-shell__aside {
          flex: 0 0 64px;
        }
      }

      /* iOS Safari 地址栏收展会改变 100vh，动态视口单位更稳 */
      @supports (min-height: 100dvh) {
        body,
        #app {
          min-height: 100dvh;
        }

        .boot-shell {
          min-height: 100dvh;
        }
      }
    </style>
    <script src="/storage-migrate.js"></script>
    <script>
      (function () {
        var keys = ['oneboard-theme-mode', 'onebord-theme-mode']
        var mode = 'dark'
        try {
          for (var i = 0; i < keys.length; i += 1) {
            var stored = localStorage.getItem(keys[i])
            if (stored === 'light' || stored === 'dark' || stored === 'auto') {
              mode = stored
              break
            }
          }
        } catch (e) {}
        var theme = mode === 'auto'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode
        document.documentElement.setAttribute('data-theme', theme)
        document.documentElement.style.colorScheme = theme
      })()
    </script>
  </head>
  <body>
    <div id="app">
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-shell__aside"></div>
        <div class="boot-shell__main"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
